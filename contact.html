<body>
    <div class="site-shell inner-page-shell">
        <header class="site-header">
            <div class="brand-mark">L</div>
            <a class="brand-name" href="index.html">Lotto Insight Lab</a>
            <nav class="main-nav" aria-label="주요 메뉴">
                <a href="index.html">홈</a>
                <a href="about.html">소개</a>
                <a href="privacy.html">개인정보 처리방침</a>
            </nav>
            <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환">
                <span class="sun-icon">☀️</span>
                <span class="moon-icon">🌙</span>
            </button>
        </header>
        <main class="doc-layout">
            <section class="doc-card">
                <p class="section-kicker">CONTACT</p>
                <h1>운영자에게 문의하기</h1>
                <p>콘텐츠 수정 요청, 제휴 문의, 데이터 표기 오류 제보는 아래 양식으로 보내주세요. 제출된 정보는 문의 응답 목적에 한해 사용합니다.</p>
                <form id="partnership-form" class="contact-form" action="https://formspree.io/f/mykbkogp" method="POST">
                    <label>
                        <span>이름</span>
                        <input type="text" name="name" required>
                    </label>
                    <label>
                        <span>이메일</span>
                        <input type="email" name="email" required>
                    </label>
                    <label>
                        <span>문의 유형</span>
                        <select name="topic" required>
                            <option value="" selected disabled>선택해주세요</option>
                            <option value="general">일반 문의</option>
                            <option value="correction">정정 요청</option>
                            <option value="partnership">제휴 문의</option>
                        </select>
                    </label>
                    <label>
                        <span>내용</span>
                        <textarea name="message" rows="8" required></textarea>
                    </label>
                    <input type="hidden" name="_subject" value="Lotto Insight Lab 문의 접수">
                    <div class="form-actions">
                        <button type="submit" id="submit-button" class="primary-btn">문의 보내기</button>
                        <p id="form-status" class="micro-copy" aria-live="polite"></p>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
